name: Daily ETF refresh

on:
  schedule:
    # 一天觸發 3 次防呆。任一次成功就有當天時間戳更新。
    # build_site.py 每次注入新 BUILD_UTC → HTML 一定有 diff → commit 必發生。
    # cron 用 UTC，TW = UTC + 8
    - cron: '30 9 * * *'    # TW 17:30 (主場) — issuer PCF 揭露完成後
    - cron: '0 12 * * *'    # TW 20:00 (傍晚補) — 漏抓重試
    - cron: '0 21 * * *'    # TW 05:00 隔天 (清晨保險) — 過夜重試
  workflow_dispatch:        # 允許手動觸發

permissions:
  contents: write           # 給 GITHUB_TOKEN 推 commit 的權限

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # playwright chromium 給可能要用 stealth 的 fetcher
          python -m playwright install --with-deps chromium

      - name: Run daily fetcher
        id: fetch
        run: |
          python scripts/run_daily.py 2>&1 | tee /tmp/daily.log
          echo "---"
          grep -c '✓' /tmp/daily.log || true
          grep -c '✗' /tmp/daily.log || true
        continue-on-error: true

      - name: Build static site
        run: python scripts/build_site.py

      - name: Commit + push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/holdings.db docs/
          # build_site.py 每次注入新 BUILD_UTC 時間戳，HTML 永遠有 diff
          # 即使 holdings.db 不變（週末 / 假日 issuer 沒發新 PCF），timestamp commit 仍會發生
          if git diff --staged --quiet; then
            echo "no diff (truly nothing changed — should be rare)"
            exit 0
          fi
          OK=$(grep -c '✓' /tmp/daily.log || echo 0)
          FAIL=$(grep -c '✗' /tmp/daily.log || echo 0)
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "daily $DATE: ok=$OK fail=$FAIL"
          git push

      - name: Upload fetch log on failure
        if: failure() || steps.fetch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: daily-log
          path: /tmp/daily.log
          retention-days: 14
