name: Daily ETF refresh

on:
  schedule:
    # 09:30 UTC = 17:30 台灣時間（盤後 + 多數投信 PCF 已揭露）
    - cron: '30 9 * * 1-5'
  workflow_dispatch:        # 允許手動觸發

permissions:
  contents: write           # 給 GITHUB_TOKEN 推 commit 的權限

concurrency:
  group: daily-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas openpyxl playwright
          # playwright chromium 給可能要用 stealth 的 fetcher
          python -m playwright install --with-deps chromium

      - name: Run daily fetcher
        id: fetch
        run: |
          python scripts/run_daily.py 2>&1 | tee /tmp/daily.log
          echo "---"
          grep -c '✓' /tmp/daily.log || true
          grep -c '✗' /tmp/daily.log || true
        continue-on-error: true

      - name: Build static site
        run: python scripts/build_site.py

      - name: Commit + push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/holdings.db docs/
          if git diff --staged --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          OK=$(grep -c '✓' /tmp/daily.log || echo 0)
          FAIL=$(grep -c '✗' /tmp/daily.log || echo 0)
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "daily $DATE: ok=$OK fail=$FAIL"
          git push

      - name: Upload fetch log on failure
        if: failure() || steps.fetch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: daily-log
          path: /tmp/daily.log
          retention-days: 14
