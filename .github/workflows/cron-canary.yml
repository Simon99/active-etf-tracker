name: Cron canary

on:
  schedule:
    # 每 10 分鐘整點觸發（UTC 任何時間，週末也跑）
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read   # 不寫 repo，純驗 cron 是否準時

concurrency:
  group: cron-canary
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Ping
        run: |
          echo "fired_at_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "fired_at_local=$(date +%Y-%m-%dT%H:%M:%S%z)"
          echo "trigger=${{ github.event_name }}"
          echo "scheduled_for=${{ github.event.schedule || 'manual' }}"
